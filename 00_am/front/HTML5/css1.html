<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 컨트롤 + / 주석(설명, comment) */
      /* * {
        color: red;
      } */
      h1 {
        color: red;
      }
      p {
        color: blue;
      }
      /* h1,
      p {
        background-color: rgb(41, 248, 10);
      } */

      #header {
        width: 800px;
        background: yellow;
      }
      #wrap {
        width: 800px;
      }
      #aside {
        width: 200px;
        float: left;
        background: blue;
      }
      #content {
        width: 600px;
        float: left;
        background: green;
      }
      .select {
        color: lightgreen;
        background: pink;
      }
      ul {
        clear: both;
      }

      .btn {
        background-color: green;
      }
      .btn:hover {
        background-color: rgb(0, 155, 0);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>제목 글자</h1>
    <p>오늘은 즐거운 금요일!!!</p>
    <div id="header">
      <h1>#header태그</h1>
    </div>
    <div id="wrap">
      <div id="aside">
        <h1>#aside태그</h1>
      </div>
      <div id="content">
        <h1>#content태그</h1>
      </div>
    </div>

    <ul>
      <li class="select">사과</li>
      <li>바나나</li>
      <li class="select">오렌지</li>
      <li>감</li>
    </ul>

    <button class="btn">버튼</button>
  </body>
</html>
