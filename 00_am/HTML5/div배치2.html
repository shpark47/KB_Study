<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #total {
        background: lightcyan;
        width: 800px;
        height: 800px;
      }
      #top {
        /* 컨트롤 + / --설명 */
        background: lime;
        width: 800px;
        height: 100px;
        padding: 2px;
      }
      #center {
        padding: 30px;
        width: 800px;
        height: 500px;
        vertical-align: middle;
      }
      #top2 {
        /* 장바구니 부분 */
        background: black;
        color: yellow;
        position: fixed;
        top: 5px;
        right: 5px;
        width: 250px;
        height: 100px;
        border-radius: 100px 10px;
      }
      li {
        list-style: none;
        float: left;
        padding: 15px;
        text-align: center;
      }
      li:nth-child(2n) {
        background-color: orange;
      }
      li:nth-child(2n + 1) {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div id="total">
      <div id="top">
        <ul>
          <li>회원가입</li>
          <li>제품정보</li>
          <li>게시판</li>
          <li>장바구니</li>
        </ul>
      </div>
      <div id="top2">장바구니 들어갈 자리</div>
      <div id="center">테이블 들어갈 자리</div>
    </div>
  </body>
</html>
