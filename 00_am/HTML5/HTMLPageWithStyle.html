<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Basic</title>
    <!-- 설명(주석), comment, 컨트롤+/ 단축키사용하면 됨. -->
    <!-- 왼쪽 메뉴 자동숨기기/보이기 왔다갔다 컨트롤 + b -->
    <!-- 저장 컨트롤 + s -->
    <!-- 
    설명은 여러줄 쓸 수도 있음.
    html문서만들고, 반드시 저장해주세요.!!
    저장후 html문서를 확인하고 싶음..방법은???
    브라우저에서 확인해야함.
    -->
    <!-- css는 스타일 지정 문법, html안에 직접 css를 쓰고 싶으면 style태그를 쓰면 됨. -->
    <style>
      h2 {
        color: white;
        background-color: skyblue;
      }
    </style>
  </head>
  <body>
    <h1>Hello World 안녕</h1>
    <h2>Bye World</h2>
  </body>
</html>
