<!DOCTYPE html>
<html>
  <head>
    <title>CSS3 Box Model</title>
    <style>
      div {
        margin: 10px; /* 바깥쪽 여백을 10px로 설정 */
        padding: 30px; /* 안쪽 여백을 30px로 설정 */
        width: 100px; /* 요소의 너비를 100px로 설정 */
        height: 100px; /* 요소의 높이를 100px로 설정 */
        background-color: #ff0000; /* 배경색을 빨간색으로 설정 */
        border: 20px solid #000000; /* 테두리를 20px 두께의 실선 검정색으로 설정 */
      }
    </style>
  </head>
  <body>
    <div></div>
  </body>
</html>
