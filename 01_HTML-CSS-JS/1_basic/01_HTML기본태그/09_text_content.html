    <h1>홍차</h1>
    <hr />
    <h2>정의</h2>
    <p>
      홍차는 중국에서 생산되는 차로, 흑차의 한 종류이다. 홍차는 발효가 완료된
      차로, 향미와 향이 풍부하며, 다양한 건강 효과를 가지고 있다.
    </p>

    <h2>등급</h2>
    <p>
      홍차는 여러가지로 등급이 매겨진다. 일반적으로 찻잎의 모양에 따 른 등급과
      가공상태에 따른 등급을 조합하여 표시한다.
    </p>

    <p>
      - 브로큰 페코<br />
      - 브로큰 페코 수숑<br />
      - 브로큰 오렌지 페코 패닝
    </p>
