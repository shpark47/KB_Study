<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>숙제 스니펫</title>

    <style>
      div > div > h1 {
        background: yellow;
      }

      div > ul > li:first-child {
        background: red;
      }

      div li:last-child {
        background: blue;
      }

      div > ul > li:nth-child(1) {
        background-color: green;
      }

      /* li 태그들 중 class가 second인 요소의
         글씨 크기를 24px로 변경
      */
      div > ul > li.second {
        font-size: 24px;
      }

      /* id가 title인 요소에 마우스를 올렸을 때
      글씨색을 빨강색으로 변경 */
      #title:hover {
        color: red;
      }

      body {
        /* 너비 */
        width: 1000px;
        border: 1px solid black;
      }

      div {
        width: 80%;
        background: plum;
      }
    </style>
  </head>
  <body>
    <div>
      <h1 id="title">HTML5 기본</h1>
    </div>
    <div>
      <ul>
        <li><a href="#">메뉴 - 1</a></li>
        <li class="second"><a href="#">메뉴 - 2</a></li>
        <li><a href="#">메뉴 - 3</a></li>
      </ul>
    </div>
    <div>
      <div>
        <h1>Lorem ipsum dolor sit amet</h1>
        <p>Lorem ipsum dolor sit amet.</p>
      </div>
      <div>
        <h1>Lorem ipsum dolor sit amet</h1>
        <p>Lorem ipsum dolor sit amet.</p>
      </div>
    </div>
    <div>
      <span>서울특별시 강서구 내발산동</span>
    </div>
  </body>
</html>
