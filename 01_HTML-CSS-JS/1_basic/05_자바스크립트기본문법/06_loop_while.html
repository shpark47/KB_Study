<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반복문 - while</title>
  </head>
  <body>
    <h3>while문</h3>
    <pre>
      작성법
      while( 조건식 ){
        반복 수행할 코드;
      }
    </pre>

    <script>
      let i = 0; // 변수 선언 및 초기화
      let array = [10, 20, 30, 40, 50];

      while (i < array.length) {
        alert(array[i++]);
        // 배열명[인덱스번호] : 배열에 담긴 값 하나씩 꺼내기
        // (참고)
        // i++ : 코드 수행 후 i값 1 증가
        // ++i : i값 1 증가 후 코드 수행

        // i값 1 증가
        // i++;
      }
    </script>
  </body>
</html>
