<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수</title>
  </head>
  <body>
    <h3>함수 function</h3>
    <pre>
      function 함수명([매개변수]){ // 함수 선언
        // [매개변수] : 생략 가능
        
        // 함수 정의
        return 반환값;
      }

      함수명(); // 함수 호출
    </pre>

    <script>
      // 함수 선언
      function f(x) {
        return x + x; // 함수를 호출한 곳으로 값 반환
      }

      alert(f(3)); // 함수 호출
    </script>
  </body>
</html>
