<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Basic</title>
    <script>
      // Date 객체 : 현재 시간
      let date = new Date();
      // console.log(date);
      // -> 개발자도구에서 확인

      let hours = date.getHours();
      // console.log(hours);

      if (hours < 12) {
        // 조건식이 true일 때만 수행!
        alert('오전입니다.');
      } else {
        // hours >= 12
        alert('오후입니다.');
      }
    </script>
  </head>
  <body>
    <h3>조건문 if - else</h3>
    <pre>
      작성법
      if( 조건식 ) {
        조건식이 true일 때 수행할 코드
      } else {
        조건식이 false일 때 수행할 코드
      }
    </pre>
  </body>
</html>
