<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        width: 600px;
        border: 1px solid black;
        border-collapse: collapse;
      }
      table td,
      table th {
        border: 1px solid black;
        text-align: center;
      }
      table > thead > tr {
        color: yellow;
        background-color: purple;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <table>
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(contact, index) in contacts" :key="name">
            <td>{{index+1}}</td>
            <td>{{contact.name}}</td>
            <td>{{contact.phone}}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            contacts: [
              {
                name: 'RM',
                phone: '010-3456-8299',
              },
              {
                name: '정국',
                phone: '010-3456-8298',
              },
              {
                name: '제이홉',
                phone: '010-3456-8297',
              },
              {
                name: '슈가',
                phone: '010-3456-8296',
              },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
