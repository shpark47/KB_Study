<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        width: 600px;
        border: 1px solid black;
        border-collapse: collapse;
      }
      table td,
      table th {
        border: 1px solid black;
        text-align: center;
      }
      table > thead > tr {
        color: yellow;
        background-color: purple;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <table>
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
        </thead>
        <tbody>
          <!-- 
            - :key 속성
            - 반복 요소의 고유 식별자를 지정
            - 반복 요소의 고유 식별자를 지정하지 않으면 오류 발생
            - 배열 순회 시 index를 :key로 지정하는 것은 매우 좋지 않음!!
              왜? 데이터가 바뀌어도 Vue가 같은 DOM으로 착각해서 DOM 재사용이 꼬일 수 있음
          -->
          <tr v-for="contact in contacts" :key="no">
            <td>{{contact.no}}</td>
            <td>{{contact.name}}</td>
            <td>{{contact.phone}}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            contacts: [
              {
                no: 1011,
                name: 'RM',
                phone: '010-3456-8299',
              },
              {
                no: 1012,
                name: '정국',
                phone: '010-3456-8298',
              },
              {
                no: 1013,
                name: '제이홉',
                phone: '010-3456-8297',
              },
              {
                no: 1014,
                name: '슈가',
                phone: '010-3456-8296',
              },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
