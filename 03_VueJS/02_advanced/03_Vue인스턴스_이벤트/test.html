<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v1</h1>

      <!-- 아래의 목록을 완성하세요 -->
      <ul>
        <li
          class="post-item"
          @click="listClick(post)"
          v-for="post in posts"
          :key="post.no"
        >
          <div>{{post.no}}. {{post.title}}</div>
        </li>
      </ul>

      <!-- 아래의 div를 완성하세요 -->
      <div
        class="post-content"
        v-for="post in posts"
        :key="post.no"
        v-show="post.no == selectedNo"
      >
        <h2>{{post.title}}</h2>
        <p>{{post.content}}</p>
        <button @click="close">닫기</button>
      </div>
    </div>

    <script>
      Vue.createApp({
        data() {
          return {
            posts: [
              {
                no: 1,
                title: 'Vue.js 기초 배우기',
                content:
                  'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
              },
              {
                no: 2,
                title: '자바스크립트 ES6 문법',
                content:
                  'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
              },
              {
                no: 3,
                title: 'Node.js와 Express',
                content:
                  'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
              },
              {
                no: 4,
                title: 'MongoDB 기본 개념',
                content:
                  'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
              },
              {
                no: 5,
                title: '프론트엔드와 백엔드의 차이',
                content:
                  '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
              },
              {
                no: 6,
                title: '비동기 프로그래밍',
                content:
                  'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
              },
              {
                no: 7,
                title: 'Vue Router 사용법',
                content:
                  'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
              },
              {
                no: 8,
                title: '컴포넌트 기반 개발',
                content:
                  'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
              },
              {
                no: 9,
                title: 'CSS와 SCSS 차이점',
                content:
                  'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
              },
              {
                no: 10,
                title: 'Git과 GitHub 사용법',
                content:
                  'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
              },
            ],
            // 아래에 필요한 데이터를 추가하세요
            selectedNo: null,
          };
        },
        methods: {
          // 아래에 화면처럼 동작하도록 메서드를 구현해보세요
          listClick(post) {
            this.selectedNo = post.no;
          },
          close() {
            this.selectedNo = null;
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
